<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyaHub WATS | Chargement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .spinner { border: 4px solid rgba(16, 185, 129, 0.1); border-left-color: #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="text-center px-6">
        <div class="spinner mx-auto mb-6"></div>
        <h1 class="text-2xl font-extrabold text-slate-900 mb-2">Synchronisation AyaHub</h1>
        <p class="text-slate-500 font-medium mb-8">Ouverture du terminal WhatsApp...</p>
        
        <a id="manual-link" href="https://script.google.com/macros/s/AKfycbyxeEa9phMlyoRamMHeYPt_b1zr92aG24IZjJKMZmDF09a13AJ11eSXY_60wF6X9NWT9g/exec" 
           class="bg-emerald-500 text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-emerald-200 active:scale-95 transition-transform inline-block">
            Ouvrir Manuellement
        </a>
    </div>

    <script>
        const target = "https://script.google.com/macros/s/AKfycbyxeEa9phMlyoRamMHeYPt_b1zr92aG24IZjJKMZmDF09a13AJ11eSXY_60wF6/exec";
        
        // Try auto-redirect first
        window.location.replace(target);

        // Fallback for Brave: if still here after 2 seconds, nudge the user
        setTimeout(() => {
            console.log("Redirect blocked by browser shields. Waiting for user action.");
        }, 2000);
    </script>
</body>
</html>
