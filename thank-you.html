<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم تأكيد طلبك بنجاح!</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    
    // 👇 تم وضع الـ Pixel ID ديالك هنا مباشرة 👇
    fbq('init', '2663210157367551'); 
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=2663210157367551&ev=PageView&noscript=1"
    /></noscript>

    <style>
        body { margin: 0; padding: 0; background-color: #f8f9fa; font-family: 'Tajawal', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .box { background: #fff; padding: 40px 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; width: 90%; }
        .icon { width: 80px; height: 80px; background: #2a9d8f; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; animation: bounce 1s ease; }
        h1 { color: #1d3557; font-size: 24px; margin-bottom: 10px; }
        p { color: #6c757d; font-size: 16px; line-height: 1.5; font-weight: 700; margin-bottom: 20px; }
        .highlight { background: #fff3f3; color: #e63946; padding: 10px; border-radius: 8px; font-weight: 900; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} 60% {transform: translateY(-10px);} }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">✓</div>
        <h1>تم تسجيل طلبك بنجاح!</h1>
        <p>شكراً لثقتك بنا. لقد توصلنا بطلبك وسنقوم بمعالجته فوراً.</p>
        <div class="highlight">
            المرجو إبقاء هاتفك مشغلاً، سوف نتصل بك في غضون 24 ساعة لتأكيد العنوان وإرسال الطلب. 📞
        </div>
    </div>

    <script>
        // كنتأكدو واش هاد الكليان عاد دخل أول مرة لهاد الصفحة
        if (!sessionStorage.getItem('order_tracked')) {
            
            // يلا كانت أول مرة، كنصيفطو الـ Purchase لفيسبوك
            fbq('track', 'Purchase', {
                content_name: 'Eelhoe Water Gel',
                content_type: 'product',
                value: 99,
                currency: 'MAD'
            });

            // كنسدو القفل باش يلا دار Refresh ما يعاودش يصيفط المبيعة ثانية
            sessionStorage.setItem('order_tracked', 'true');
            console.log("✅ Pixel Purchase Fired: 99 DH");
        } else {
            console.log("🛑 Duplicate Blocked: Already Tracked");
        }
    </script>
</body>
</html>
