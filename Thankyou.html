<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم تأكيد الطلب - Ayamall</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '2663210157367551');
    fbq('track', 'PageView');

    // 1. Look inside the URL for the secret price
    const urlParams = new URLSearchParams(window.location.search);
    const exactPrice = urlParams.get('price');

    // 2. Fire the STANDARD Purchase Pixel with the exact value
    if (exactPrice) {
        fbq('track', 'Purchase', { 
            value: exactPrice, 
            currency: 'MAD' 
        });
    } else {
        // Fallback for old products
        fbq('track', 'Purchase'); 
    }
    </script>
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=2663210157367551&ev=PageView&noscript=1"/></noscript>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .success-animation { animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center border border-gray-100 success-animation">
        
        <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h1 class="text-3xl font-black text-gray-900 mb-2">تم تأكيد طلبك بنجاح!</h1>
        <p class="text-gray-600 font-bold mb-8 leading-relaxed">شكراً لك على ثقتك في Ayamall.<br>سنتصل بك خلال <span class="text-orange-500 font-black">24 ساعة</span> من رقم هاتفنا لتأكيد العنوان وشحن طلبيتك.</p>

        <div class="bg-orange-50 p-4 rounded-xl border border-orange-100 mb-8 text-right">
            <h3 class="font-black text-orange-800 mb-2 text-sm flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                ملاحظة هامة:
            </h3>
            <p class="text-xs text-orange-700 font-bold">يرجى إبقاء هاتفك قريباً منك للرد على مكالمة التأكيد لتسريع عملية الشحن.</p>
        </div>

        <a href="/" class="block w-full bg-gray-900 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-transform">
            العودة للمتجر
        </a>
    </div>

</body>
</html>
